<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Per Adri ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at top, #ffd1dc, #ffffff, #f7f7ff);
}

/* glow animato sfondo */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background: radial-gradient(circle, rgba(255,77,136,0.25), transparent 70%);
    filter: blur(80px);
    animation: float 6s ease-in-out infinite alternate;
}

@keyframes float{
    from{transform:translate(-100px,-50px);}
    to{transform:translate(100px,50px);}
}

.card{
    position:relative;
    background:rgba(255,255,255,0.75);
    backdrop-filter: blur(15px);
    padding:50px 60px;
    border-radius:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    font-family:'Playfair Display', serif;
    font-size:48px;
    margin:0;
    color:#ff4d88;
}

p{
    font-size:18px;
    margin-top:10px;
    color:#444;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    padding:14px 40px;
    font-size:18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:0.25s ease;
}

#si{
    background:#4CAF50;
    color:white;
}

#si:hover{
    transform:scale(1.08);
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

/* cuori */
.heart{
    position:absolute;
    color:#ff4d88;
    font-size:16px;
    animation:fall 6s linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}

/* musica button */
.music{
    margin-top:15px;
    background:#111;
    color:white;
    padding:10px 20px;
    border-radius:15px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h1>Eii Adri ❤️</h1>
    <p>Robb ti deve dire una cosa...</p>

    <div class="buttons">
        <button id="si" onclick="window.location='amore.html'">SI ❤️</button>
    </div>

    <button class="music" onclick="document.getElementById('audio').play()">
        ▶ Avvia musica
    </button>
</div>

<button id="no">NO 😈</button>

<audio id="audio" loop>
    <source src="musica.mp3" type="audio/mp3">
</audio>

<script>

// NO intelligente (smooth runaway)
const no = document.getElementById("no");

document.addEventListener("mousemove",(e)=>{
    const r = no.getBoundingClientRect();

    const dx = e.clientX - (r.left + r.width/2);
    const dy = e.clientY - (r.top + r.height/2);

    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 160){
        const angle = Math.atan2(dy,dx);
        const moveX = Math.cos(angle) * -200;
        const moveY = Math.sin(angle) * -200;

        no.style.transform = `translate(${moveX}px, ${moveY}px)`;
    }
});

// cuori
setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},180);

</script>

</body>
</html>
