<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Per Adri ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg,#ffe6f0,#fff);
    overflow:hidden;
}

h1{
    font-size:40px;
    margin-bottom:10px;
    color:#ff4d88;
}

h2{
    font-weight:300;
    margin-bottom:40px;
    color:#333;
}

.buttons{
    display:flex;
    gap:20px;
}

button{
    padding:15px 40px;
    font-size:20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
}

#si{
    background:#4CAF50;
    color:white;
}

#si:hover{
    transform:scale(1.1);
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<h1>Eii Adri ❤️</h1>
<h2>Robb ti deve dire una cosa...</h2>

<div class="buttons">
    <button id="si" onclick="window.location='amore.html'">SI ❤️</button>
</div>

<button id="no">NO 😡</button>

<script>
const no = document.getElementById("no");

function moveButton(){
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);
    no.style.left = x + "px";
    no.style.top = y + "px";
}

no.addEventListener("mouseover", moveButton);
no.addEventListener("touchstart", moveButton);
</script>

</body>
</html>
