<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Brava Amore ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle,#fff0f5,#ffe6f0);
}

h1{
    text-align:center;
    margin-top:40px;
    font-size:32px;
    color:#ff1493;
}

/* OGGETTI CHE CADONO */
.fall{
    position:absolute;
    font-size:35px;
    animation: fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}

/* 2 animali interattivi */
.pet{
    position:absolute;
    font-size:60px;
    transition:0.15s;
}
</style>
</head>

<body>

<h1>
BRAVA AMORE ❤️<br>
HAI SUPERATO MOLTI ESAMI 📚
</h1>

<script>

const animals = ["🐱","🐶","🐱‍👤","🐕","🐈","🐩"];

/* 🐱🐶 CADONO */
for(let i=0;i<25;i++){
    const el = document.createElement("div");
    el.className="fall";
    el.innerHTML = animals[Math.floor(Math.random()*animals.length)];

    el.style.left = Math.random()*100+"vw";
    el.style.animationDuration = (3 + Math.random()*4)+"s";

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),8000);
}

/* 🐱 e 🐶 INTERATTIVI */
const cat = document.createElement("div");
cat.className="pet";
cat.innerHTML="🐱";
document.body.appendChild(cat);

const dog = document.createElement("div");
dog.className="pet";
dog.innerHTML="🐶";
document.body.appendChild(dog);

let cx=100, cy=200;
let dx=300, dy=300;

cat.style.left=cx+"px";
cat.style.top=cy+"px";

dog.style.left=dx+"px";
dog.style.top=dy+"px";

document.addEventListener("mousemove",(e)=>{

    let mx=e.clientX;
    let my=e.clientY;

    // 🐱 scappa dal mouse
    cx += (cx - mx)*0.03;
    cy += (cy - my)*0.03;

    // 🐶 segue il mouse
    dx += (mx - dx)*0.02;
    dy += (my - dy)*0.02;

    cat.style.left=cx+"px";
    cat.style.top=cy+"px";

    dog.style.left=dx+"px";
    dog.style.top=dy+"px";
});

</script>

</body>
</html>
