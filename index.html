<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Per Adri ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at top,#ffd1dc,#ffffff);
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    font-size:38px;
    color:#ff4d88;
    margin-bottom:10px;
}

h2{
    font-weight:400;
    color:#444;
    margin-bottom:120px;
}

button{
    padding:15px 40px;
    font-size:18px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

#si{
    background:#4CAF50;
    color:white;
}

#si:hover{
    transform:scale(1.08);
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
    transition:0.2s;
}
</style>
</head>

<body>

<div class="container">
    <h1>Ei Adri ❤️ Robb ti deve dire una cosa</h1>
    <h2>Vuoi sapere cosa?</h2>

    <button id="si" onclick="window.location='amore.html'">SI ❤️</button>
</div>

<button id="no">NO 😈</button>

<script>

const no = document.getElementById("no");

// posizione iniziale
no.style.left = "60%";
no.style.top = "65%";

// 😈 NO intelligente
document.addEventListener("mousemove",(e)=>{

    const rect = no.getBoundingClientRect();

    const dx = e.clientX - (rect.left + rect.width/2);
    const dy = e.clientY - (rect.top + rect.height/2);

    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 140){

        const angle = Math.atan2(dy,dx);

        const moveX = Math.cos(angle) * -200;
        const moveY = Math.sin(angle) * -200;

        no.style.transform = `translate(${moveX}px, ${moveY}px)`;
    }
});

</script>

</body>
</html>
