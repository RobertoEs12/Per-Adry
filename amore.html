<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Ti Amo ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at top,#fff0f5,#ffe6f0,#ffffff);
}

h1{
    text-align:center;
    margin-top:70px;
    font-family:'Playfair Display', serif;
    font-size:44px;
    color:#ff1493;
}

.cat{
    position:absolute;
    font-size:40px;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.15));
}

.heart{
    position:absolute;
    color:#ff4d88;
    font-size:18px;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<h1>
🐱 Sei bravissima ❤️<br>
Hai fatto un sacco di cose incredibili 📚<br>
Ti amo tantissimo 😘
</h1>

<script>

// gatti con movimento morbido (ease-like)
const cats=["🐱","🐈","🐈‍⬛","😺","😻"];

for(let i=0;i<14;i++){

    const c=document.createElement("div");
    c.className="cat";
    c.innerHTML=cats[Math.floor(Math.random()*cats.length)];

    let x=Math.random()*90;
    let y=Math.random()*90;

    let vx=(Math.random()*1.2)+0.4;
    let vy=(Math.random()*1.2)+0.4;

    c.style.left=x+"vw";
    c.style.top=y+"vh";

    document.body.appendChild(c);

    setInterval(()=>{
        x+=vx;
        y+=vy;

        if(x<0 || x>95) vx*=-1;
        if(y<0 || y>90) vy*=-1;

        c.style.left=x+"vw";
        c.style.top=y+"vh";
    },20);
}

// cuori
setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},160);

</script>

</body>
</html>
