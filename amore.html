<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Brava Amore ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle,#fff0f5,#ffe6f0);
}

h1{
    text-align:center;
    margin-top:50px;
    font-size:34px;
    color:#ff1493;
}

/* GIF */
.animal{
    position:absolute;
    width:120px;
    transition:0.2s;
}
</style>
</head>

<body>

<h1>
BRAVA AMORE ❤️<br>
HAI SUPERATO MOLTI ESAMI 📚
</h1>

<!-- GIF 1 -->
<img class="animal" id="cat" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">

<!-- GIF 2 -->
<img class="animal" id="dog" src="https://media.giphy.com/media/dzaUX7CAG0Ihi/giphy.gif">

<script>

const cat = document.getElementById("cat");
const dog = document.getElementById("dog");

// posizione iniziale
let cx = 100, cy = 200;
let dx = 300, dy = 350;

cat.style.left = cx+"px";
cat.style.top = cy+"px";

dog.style.left = dx+"px";
dog.style.top = dy+"px";

// 🐱🐶 reagiscono al mouse
document.addEventListener("mousemove",(e)=>{

    const mx = e.clientX;
    const my = e.clientY;

    // CAT scappa
    let catDx = cx - mx;
    let catDy = cy - my;

    cx += catDx * 0.02;
    cy += catDy * 0.02;

    cat.style.left = cx+"px";
    cat.style.top = cy+"px";

    // DOG segue
    let dogDx = mx - dx;
    let dogDy = my - dy;

    dx += dogDx * 0.015;
    dy += dogDy * 0.015;

    dog.style.left = dx+"px";
    dog.style.top = dy+"px";
});

</script>

</body>
</html>
