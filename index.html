<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Per Adri ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#ffe6f0;
    font-family:Arial;
    overflow:hidden;
}

h1{
    text-align:center;
}

button{
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin:10px;
}

#si{
    background:#4CAF50;
    color:white;
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<h1>
Eii Adri ❤️<br>
Robb vuole dirti una cosa...<br><br>
Vuoi saperla?
</h1>

<button id="si" onclick="window.location='amore.html'">
SI ❤️
</button>

<button id="no">
NO 😡
</button>

<script>

const no = document.getElementById("no");

document.addEventListener("mousemove",(e)=>{

    const x = no.offsetLeft;
    const y = no.offsetTop;

    const dx = e.clientX - x;
    const dy = e.clientY - y;

    const distanza = Math.sqrt(dx*dx + dy*dy);

    if(distanza < 150){

        no.style.left =
            Math.random()*(window.innerWidth-150)+"px";

        no.style.top =
            Math.random()*(window.innerHeight-80)+"px";
    }

});
</script>

</body>
</html>
