<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Ti Amo ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle,#fff0f5,#ffe6f0);
}

h1{
    text-align:center;
    margin-top:60px;
    font-size:42px;
    color:#ff1493;
}

.cat{
    position:absolute;
    width:80px;
    height:80px;
    background-size:cover;
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<h1>
🐱 Sei bravissima ❤️<br>
Hai passato un sacco di esami 📚<br>
Ti amo tantissimo 😘
</h1>

<script>

// 🐱 GATTI MIGLIORI (GIF STYLE EMOJI SIMULATA)
const cats = [
"🐱","🐈","🐈‍⬛","😺","😸"
];

for(let i=0;i<12;i++){

    const cat = document.createElement("div");
    cat.className="cat";
    cat.innerHTML = cats[Math.floor(Math.random()*cats.length)];

    let x = Math.random()*90;
    let y = Math.random()*90;

    let vx = (Math.random()*2)+0.5;
    let vy = (Math.random()*2)+0.5;

    cat.style.left = x+"vw";
    cat.style.top = y+"vh";

    document.body.appendChild(cat);

    setInterval(()=>{
        x += vx;
        y += vy;

        if(x < 0 || x > 95) vx *= -1;
        if(y < 0 || y > 90) vy *= -1;

        cat.style.left = x+"vw";
        cat.style.top = y+"vh";
    },25);
}

// ❤️ CUORI
setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},200);

</script>

</body>
</html>
