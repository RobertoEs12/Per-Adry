<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Per Adri ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg,#ffd1dc,#ffffff);
    overflow:hidden;
}

.box{
    text-align:center;
}

h1{
    color:#ff4d88;
    font-size:36px;
    margin-bottom:10px;
}

h2{
    font-weight:400;
    color:#444;
    margin-bottom:80px;
}

#si{
    padding:15px 40px;
    font-size:18px;
    border:none;
    border-radius:15px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

#no{
    padding:15px 40px;
    font-size:18px;
    border:none;
    border-radius:15px;
    background:#ff4d4d;
    color:white;
    position:absolute;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h1>Ei Adri ❤️ Robb ti deve dire una cosa</h1>
    <h2>Vuoi sapere cosa?</h2>

    <button id="si" onclick="window.location='amore.html'">SI ❤️</button>
</div>

<button id="no">NO 😈</button>

<script>

const no = document.getElementById("no");

// posizione iniziale
no.style.left = "60%";
no.style.top = "60%";

// 😈 NO che scappa bene
document.addEventListener("mousemove",(e)=>{

    const rect = no.getBoundingClientRect();

    const dx = e.clientX - rect.left;
    const dy = e.clientY - rect.top;

    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 120){

        const x = Math.random() * (window.innerWidth - 120);
        const y = Math.random() * (window.innerHeight - 60);

        no.style.left = x + "px";
        no.style.top = y + "px";
    }
});

</script>

</body>
</html>
